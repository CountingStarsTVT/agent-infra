description = "Update project AI collaboration infrastructure to latest templates"
prompt = """
Update the current project's AI collaboration infrastructure to match the latest ai-collaborator templates.

Steps:

1. **Read project config**:
   - Read `collaborator.json` from project root.
   - Extract: source, project, org, branchPrefix, language, modules, files.

2. **Locate template source**:
   - If source is "self", use current repository.
   - Otherwise, read from `~/.ai-collaborator/`.
   - If not found, report error and stop.

3. **Determine update scope**:
   - Only process files belonging to modules listed in `collaborator.json.modules`.

4. **Process managed files**:
   - Read from template source, select language version, adapt project references.
   - Overwrite existing files. Create new template files. Flag removed files.

5. **Process merged files** (AI intelligent merge):
   - Read latest template and current local file.
   - Identify template standard sections vs user customizations.
   - Update template sections, preserve user customizations.
   - When in doubt, preserve user content. Never silently delete user-added content.

6. **Skip ejected files**.

7. **Update collaborator.json** templateVersion.

8. **Output report**: managed/merged/ejected file status.

**STOP**: Do not make other changes to the project.
"""
