description = "Mark a task as blocked and record the reason"
prompt = """
Mark task {{args}} as blocked.

**Task check**:
!{if [ -d .ai-workspace/active/{{args}} ]; then echo "Found"; else echo "Not Found"; fi}

Steps:

1. **Verify task**: If not found, report error.

2. **Record blocking reason**:
   - Ask user for the specific reason (if not provided in arguments).
   - Blocking type: technical / requirement / resource / decision.

3. **Update task status**:
   - Modify `task.md`: status: blocked, blocked_at: current time, blocked_reason.
   - Add "Blocking Information" section to `task.md`.

4. **Move task**:
   - Create `.ai-workspace/blocked/` if needed.
   - Move task directory to `blocked/`.

5. **Inform user**:
   - Task marked as blocked at `.ai-workspace/blocked/{{args}}/`.
   - To unblock:
     1. Resolve the blocking issue, then move back:
        `mv .ai-workspace/blocked/{{args}} .ai-workspace/active/`
     2. Check status after restoring:
        - Claude Code / OpenCode: `/check-task {{args}}`
        - Gemini CLI: `/collaborator:check-task {{args}}`
        - Codex CLI: `/prompts:collaborator-check-task {{args}}`
"""
