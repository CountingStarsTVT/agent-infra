description = "Analyze a Dependabot security alert and create a remediation task"
prompt = """
Analyze Dependabot security alert #{{args}}.

**Pre-check**:
- Check if a task already exists for this alert (grep "security_alert_number: {{args}}").

Steps:

1. **Fetch info**:
   - Get repo info: `gh repo view --json owner,name`.
   - Get alert details: `gh api repos/:owner/:repo/dependabot/alerts/{{args}}`.

2. **Create task**:
   - If no existing task, create `.ai-workspace/active/TASK-{timestamp}/`.
   - Create `task.md` (record severity, cve_id, ghsa_id).

3. **Analyze**:
   - Determine affected dependency and version.
   - Search for dependency usage in project code.
   - Assess risk (impact scope, exploitability).

4. **Output document**:
   - Create `analysis.md` (vulnerability details, impact assessment, risk evaluation).

5. **Update status**: current_step: security-analysis.

6. **Inform user**:
   - Output analysis summary.
   - Next step - design fix:
     - Claude Code / OpenCode: `/plan-task {task-id}`
     - Gemini CLI: `/collaborator:plan-task {task-id}`
     - Codex CLI: `/prompts:collaborator-plan-task {task-id}`
   - If false positive, close alert:
     - Claude Code / OpenCode: `/close-dependabot {{args}}`
     - Gemini CLI: `/collaborator:close-dependabot {{args}}`
     - Codex CLI: `/prompts:collaborator-close-dependabot {{args}}`

**Note**: Critical/High -> handle immediately. Medium -> plan. Low -> may defer.
"""
