description = "Mark a task as completed and archive it"
prompt = """
Mark task {{args}} as completed and archive it.

**Prerequisites**: Code reviewed, committed, and all tests passing.

**Task status**:
!{if [ -d .ai-workspace/active/{{args}} ]; then echo "Active"; else echo "Not Active"; fi}

Steps:

1. **Verify task**:
   - Check file completeness in `.ai-workspace/active/{{args}}/` (analysis, plan, implementation, review).
   - If task not in active directory, stop.

2. **Update task metadata**:
   - Modify `task.md`: status: completed, current_step: finalize, completed_at: current time.
   - Add "Task Completion Summary" section.

3. **Archive task**:
   - Create `.ai-workspace/completed/` if it does not exist.
   - Move: `mv .ai-workspace/active/{{args}} .ai-workspace/completed/`

4. **Sync (optional)**:
   - If there is an associated Issue/PR, prompt user to sync.

5. **Inform user**:
   - Task archived to `.ai-workspace/completed/{{args}}/`.
   - List deliverables.
   - Next step if other tasks remain:
     - Claude Code / OpenCode: `/check-task {task-id}`
     - Gemini CLI: `/collaborator:check-task {task-id}`
     - Codex CLI: `/prompts:collaborator-check-task {task-id}`

**Note**: Only execute when all work is truly complete.
"""
