description = "Review task implementation and output a code review report"
prompt = """
Review the code implementation for task {{args}}.

**Check prerequisites**:
!{if [ -f .ai-workspace/active/{{args}}/task.md ]; then echo "Task file exists"; else echo "Task file not found"; fi}
!{if [ -f .ai-workspace/active/{{args}}/implementation.md ]; then echo "Implementation report exists"; else echo "Implementation report not found"; fi}

Steps:

1. **Prepare review**:
   - Read `implementation.md` to understand changes.
   - Use `git diff` or read relevant source files.

2. **Execute code review**:
   Checkpoints:
   - Code quality and standards compliance.
   - Bugs and potential issues.
   - Test coverage and quality.
   - Error handling and edge cases.
   - Security and performance.
   - Consistency with `plan.md`.

3. **Output review report**:
   - Create `review.md` with:
     - Review summary
     - Findings categorized as: Blocker / Major / Minor
     - Strengths and highlights
     - Standards/test/security/performance review details
     - Summary and recommendations

4. **Update task status**:
   - current_step: code-review, mark as complete.

5. **Inform user**:
   - Based on results, suggest next step:
     - No issues -> commit:
       - Claude Code / OpenCode: `/commit`
       - Gemini CLI: `/collaborator:commit`
       - Codex CLI: `/prompts:collaborator-commit`
     - Issues found -> refine:
       - Claude Code / OpenCode: `/refine-task {{args}}`
       - Gemini CLI: `/collaborator:refine-task {{args}}`
       - Codex CLI: `/prompts:collaborator-refine-task {{args}}`

**Principles**: Be strict but fair. Provide specific file paths and line numbers.
"""
