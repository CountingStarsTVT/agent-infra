description = "更新项目 AI 协作基础设施到最新模板"
prompt = """
更新当前项目的 AI 协作基础设施，使其与最新的 ai-collaborator 模板保持一致。

执行步骤：

1. **读取项目配置**：
   - 读取项目根目录的 `collaborator.json`。
   - 提取：source、project、org、branchPrefix、language、modules、files。

2. **定位模板源**：
   - source 为 "self" 时使用当前仓库。
   - 否则从 `~/.ai-collaborator/` 读取。
   - 如果未找到，报错并停止。

3. **确定更新范围**：
   - 只处理 modules 中列出的模块。

4. **处理 managed 文件**：
   - 从模板源读取、选择语言版本、适配项目信息、覆盖写入。
   - 新模板文件则创建，已移除的文件则标记提示用户。

5. **处理 merged 文件**（AI 智能合并）：
   - 读取模板最新版和本地当前文件。
   - 识别模板标准部分和用户定制内容。
   - 更新模板部分，保留用户定制。
   - 有疑问时保留用户内容，不静默删除用户添加的内容。

6. **跳过 ejected 文件**。

7. **更新 collaborator.json** 的 templateVersion。

8. **输出报告**：managed/merged/ejected 文件状态。

**停止**：不要对项目做其他更改。
"""
