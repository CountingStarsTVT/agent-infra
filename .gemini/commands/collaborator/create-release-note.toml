description = "Generate release notes from PRs and commits between versions"
prompt = """
Generate release notes for version {{args}}.

Steps:

1. **Determine version range**:
   - Current version from argument.
   - Previous version from argument or latest git tag.

2. **Collect changes**:
   ```bash
   git log <prev-tag>..HEAD --oneline
   gh pr list --state merged --base main --json number,title,labels
   ```

3. **Classify changes**:
   - By type: features, fixes, docs, refactoring, chores.
   - By module/scope if applicable.

4. **Generate release notes** in Markdown format:
   - Version header, release date.
   - Categorized change list with PR references.
   - Breaking changes section (if any).
   - Contributors.

5. **Create GitHub Draft Release**:
   ```bash
   gh release create v{{args}} --draft --title "v{{args}}" --notes-file <notes-file>
   ```

**Note**: Review draft before publishing.
"""
