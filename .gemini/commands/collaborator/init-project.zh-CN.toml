description = "使用 ai-collaborator 模板初始化新项目的 AI 协作基础设施"
prompt = """
使用 ai-collaborator 模板初始化新项目。

询问用户以下信息：
- **project_name**: 项目名称
- **org_name**: 组织或所有者名称
- **repo_url**: GitHub 仓库 URL
- **branch_prefix**: 分支命名前缀（默认："{project_name}-"）
- **language**: "en" | "zh-CN"（技能、命令和文档的语言）
- **license**: "MIT" | "Apache-2.0"
- **modules**: 安装哪些模块（默认：全部）
  - ai - AI 多工具协作（agents、skills、commands、workspace）
  - github - 项目治理（issue 模板、PR 模板、CI、贡献指南、安全策略）

执行步骤：

1. **定位模板**：
   - 如果在 ai-collaborator 仓库内运行，使用当前目录。
   - 否则从 `~/.ai-collaborator/` 读取。

2. **处理 ai 模块**（如果选择）：
   - 复制语言无关文件（.mailmap、.ai-workspace/ 目录结构）。
   - 安装双语选择文件（任务模板、工作流、workspace README）。
   - 安装技能（语言感知，跳过 init-project，包含 update-project）。
   - 安装 AI 工具命令（Claude、Codex、Gemini、OpenCode），按语言选择。
   - 生成 AGENTS.md（按语言选择，技术栈部分标记 TODO）。
   - 生成 AI 工具配置文件（按语言选择）。
   - 生成 .agents/README.md。

3. **处理 github 模块**（如果选择）：
   - 复制 GitHub 配置（.github/ 模板、CI）。
   - 复制基础配置（.editorconfig、.gitignore）。
   - 生成文档（CONTRIBUTING.md、SECURITY.md、License.txt、README.md）。

4. **生成 collaborator.json**。

5. **输出摘要**：报告已安装模块、创建的文件、TODO 标记和后续步骤。

**停止**：不要设置技术栈或编写业务代码。
"""
