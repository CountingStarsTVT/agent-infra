description = "标记任务完成并归档"
prompt = """
请标记任务 {{args}} 为已完成，并归档。

**前置检查**: 代码已审查通过、已提交、测试通过。

**任务状态**:
!{if [ -d .ai-workspace/active/{{args}} ]; then echo "Active"; else echo "Not Active"; fi}

执行以下步骤:

1. **验证任务**:
   - 检查 `.ai-workspace/active/{{args}}/` 下的文件完整性（analysis、plan、implementation、review）。
   - 如果任务不在 active 目录，停止执行。

2. **更新任务元数据**:
   - 修改 `task.md`: status: completed, current_step: finalize, completed_at: 当前时间。
   - 添加"任务完成总结"章节。

3. **归档任务**:
   - 创建 `.ai-workspace/completed/`（如果不存在）。
   - 移动: `mv .ai-workspace/active/{{args}} .ai-workspace/completed/`

4. **同步（可选）**:
   - 如果有关联 Issue/PR，提示用户同步。

5. **告知用户**:
   - 任务已归档到 `.ai-workspace/completed/{{args}}/`。
   - 列出交付成果。
   - 下一步如果还有其他任务:
     - Claude Code / OpenCode: `/check-task {task-id}`
     - Gemini CLI: `/collaborator:check-task {task-id}`
     - Codex CLI: `/prompts:collaborator-check-task {task-id}`

**注意**: 只有在真正完成所有工作后才执行此操作。
"""
