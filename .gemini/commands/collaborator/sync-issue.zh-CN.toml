description = "将任务进度同步到 Issue"
prompt = """
请将任务 {{args}} 的进度同步到 GitHub Issue。

**当前时间**: !{date '+%Y-%m-%d %H:%M:%S'}

**任务状态**:
!{if [ -d .ai-workspace/active/{{args}} ]; then echo "active"; else echo "check other dirs"; fi}

执行以下步骤:

1. **读取任务**:
   - 读取 `task.md` 获取 `issue_number`。
   - 读取上下文文件，提取关键进度。

2. **生成摘要**:
   - 包含: 已完成步骤、当前进展、下一步、相关文件。
   - 保持摘要简洁且人类可读。

3. **同步**:
   - `gh issue comment <issue_number> --body "<summary>"`

4. **更新状态**:
   - 在 `task.md` 中更新 `last_synced_at`。

5. **告知用户**: 同步完成。
"""
