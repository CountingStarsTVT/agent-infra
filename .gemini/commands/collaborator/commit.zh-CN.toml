description = "提交当前变更到 Git（自动检查版权头年份）"
prompt = """
请提交当前变更到 Git。

**当前状态**:
!{git status --short}
!{git log -1 --oneline}
当前年份: !{date +%Y}

执行以下步骤:

1. **检查本地修改**:
   - 如果没有暂存的修改，提示用户先使用 `git add`。
   - 务必理解用户的修改，不要覆盖用户的实现。

2. **版权头检查 (CRITICAL)**:
   - 对于每个修改过的文件，检查是否包含版权头。
   - 如果包含版权头但年份过期，更新到当前年份。
   - 格式示例: "Copyright (C) 2024" -> "Copyright (C) 2024-{当前年份}"。
   - **不要**硬编码年份。

3. **生成提交信息**:
   - 格式: `<type>(<scope>): <subject>`，英文祈使语气，不超过 50 字符。
   - Body: 详细说明变更内容（2-4 个要点）。
   - 签名: `Co-Authored-By: Gemini <noreply@google.com>`

4. **执行提交**:
   ```bash
   git commit -m "$(cat <<'EOF'
   <type>(<scope>): <subject>

   <body>

   Co-Authored-By: Gemini <noreply@google.com>
   EOF
   )"
   ```

5. **验证**: 运行 `git status` 确认提交成功。

**后置操作**:
- 如果是任务相关的提交，提示用户更新任务状态:
  - Claude Code / OpenCode: `/check-task` 或 `/complete-task`
  - Gemini CLI: `/collaborator:check-task` 或 `/collaborator:complete-task`
  - Codex CLI: `/prompts:collaborator-check-task` 或 `/prompts:collaborator-complete-task`
"""
