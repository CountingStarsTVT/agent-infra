description = "Create a task from natural language description with requirement analysis"
prompt = """
Create a task from the user's natural language description and perform requirement analysis.

BOUNDARY: Only produce task.md and analysis.md. Do NOT write business code.

User description: {{args}}

Current time: !{date '+%Y-%m-%d %H:%M:%S'}

Steps:

1. **Parse user description**:
   - Extract title (concise English, max 50 chars).
   - Determine type: feature|bugfix|refactor|docs|chore.
   - Determine workflow: feature/docs/chore -> feature-development, bugfix -> bug-fix, refactor -> refactoring.
   - If description is unclear, ask user for clarification first.

2. **Generate task ID**: Format `TASK-YYYYMMDD-HHMMSS`.

3. **Create task directory**:
   - Create `.ai-workspace/active/TASK-{timestamp}/`.
   - Create `task.md` based on `.agents/templates/task.md` (if exists).
   - Fill metadata: id, type, workflow, status, created_at, updated_at.
   - created_by: human, current_step: requirement-analysis.

4. **Execute requirement analysis** (analysis only, no business code):
   - Understand the described requirement.
   - Search related code files (read-only).
   - Analyze code structure and impact scope.
   - Identify technical risks and dependencies.
   - Estimate effort and complexity.

5. **Output analysis document**:
   - Create `analysis.md` with: requirement source, understanding, related files, impact assessment, technical risks, dependencies, effort estimate.

6. **Update task status**:
   - Mark requirement-analysis as complete.

7. **Inform user**:
   - Output task ID, title, type, workflow.
   - Suggest next step:
     - Claude Code / OpenCode: `/plan-task {task-id}`
     - Gemini CLI: `/collaborator:plan-task {task-id}`
     - Codex CLI: `/prompts:collaborator-plan-task {task-id}`

STOP: Do not continue to plan, implement, or any subsequent steps.
"""
