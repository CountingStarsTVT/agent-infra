description = "Initialize a new project with AI collaboration infrastructure"
prompt = """
Initialize a new project using ai-collaborator templates.

Ask the user for:
- **project_name**: Project name
- **org_name**: Organization or owner name
- **repo_url**: GitHub repository URL
- **branch_prefix**: Branch naming prefix (default: "{project_name}-")
- **language**: "en" | "zh-CN" (language for skills, commands, docs)
- **license**: "MIT" | "Apache-2.0"
- **modules**: Which modules to install (default: all)
  - ai - AI multi-tool collaboration (agents, skills, commands, workspace)
  - github - Project governance (issue templates, PR template, CI, contributing, security)

Steps:

1. **Locate templates**:
   - If running from within ai-collaborator repo, use current directory.
   - Otherwise, read from `~/.ai-collaborator/`.

2. **Process ai module** (if selected):
   - Copy language-neutral files (.mailmap, .ai-workspace/ structure).
   - Install bilingual-selected files (task templates, workflows, workspace README).
   - Install skills (language-aware, skip init-project, include update-project).
   - Install AI tool commands (Claude, Codex, Gemini, OpenCode) with language selection.
   - Generate AGENTS.md (language-selected, mark tech-stack sections with TODO).
   - Generate AI tool config files (language-selected).
   - Generate .agents/README.md.

3. **Process github module** (if selected):
   - Copy GitHub config (.github/ templates, CI).
   - Copy base config (.editorconfig, .gitignore).
   - Generate documents (CONTRIBUTING.md, SECURITY.md, License.txt, README.md).

4. **Generate collaborator.json** in project root.

5. **Output summary**: Report modules installed, files created, TODO markers, next steps.

**STOP**: Do not set up tech stack or write business code.
"""
