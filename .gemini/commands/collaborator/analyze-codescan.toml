description = "Analyze a Code Scanning (CodeQL) alert and create a remediation task"
prompt = """
Analyze Code Scanning (CodeQL) alert #{{args}}.

**Pre-check**:
- Check if a task already exists for this alert (grep "codescan_alert_number: {{args}}").

Steps:

1. **Fetch info**:
   - Get repo info: `gh repo view --json owner,name`.
   - Get alert details: `gh api repos/:owner/:repo/code-scanning/alerts/{{args}}`.

2. **Create task**:
   - If no existing task, create `.ai-workspace/active/TASK-{timestamp}/`.
   - Create `task.md` (record severity, rule_id, tool).

3. **Analyze**:
   - Locate source code from alert location and line number.
   - Read source code context around the alert.
   - Analyze why the rule triggered.
   - Assess risk (exploitability, attack vectors).

4. **Output document**:
   - Create `analysis.md` (alert details, source analysis, risk assessment, fix recommendations).

5. **Update status**: current_step: security-analysis.

6. **Inform user**:
   - Output analysis summary.
   - Next step - design fix:
     - Claude Code / OpenCode: `/plan-task {task-id}`
     - Gemini CLI: `/collaborator:plan-task {task-id}`
     - Codex CLI: `/prompts:collaborator-plan-task {task-id}`
   - If false positive, close alert:
     - Claude Code / OpenCode: `/close-codescan {{args}}`
     - Gemini CLI: `/collaborator:close-codescan {{args}}`
     - Codex CLI: `/prompts:collaborator-close-codescan {{args}}`

**Note**: Critical/High -> handle immediately. Medium -> plan. Low -> may defer.
"""
