description = "根据 PR 和提交记录生成版本发布说明"
prompt = """
为版本 {{args}} 生成发布说明。

执行步骤:

1. **确定版本范围**:
   - 当前版本来自参数。
   - 上一版本来自参数或最新的 git tag。

2. **收集变更**:
   ```bash
   git log <prev-tag>..HEAD --oneline
   gh pr list --state merged --base main --json number,title,labels
   ```

3. **分类变更**:
   - 按类型: 功能、修复、文档、重构、杂项。
   - 按模块/范围（如适用）。

4. **生成发布说明**（Markdown 格式）:
   - 版本标题、发布日期。
   - 分类变更列表（带 PR 引用）。
   - 破坏性变更部分（如果有）。
   - 贡献者。

5. **创建 GitHub 草稿 Release**:
   ```bash
   gh release create v{{args}} --draft --title "v{{args}}" --notes-file <notes-file>
   ```

**注意**: 发布前请先审查草稿。
"""
