description = "Analyze a GitHub Issue and create a task with requirement analysis"
prompt = """
Analyze GitHub Issue #{{args}} and create a task file.

Current time: !{date '+%Y-%m-%d %H:%M:%S'}

Issue info:
!{gh issue view {{args}} --json number,title,body,labels 2>/dev/null || echo "Issue not found"}

Steps:

1. **Check Issue info**: If not found, prompt user to verify the issue number.

2. **Generate task ID**: Format `TASK-YYYYMMDD-HHMMSS`.

3. **Create task directory**:
   - Create `.ai-workspace/active/TASK-{timestamp}/`.
   - Create `task.md` based on `.agents/templates/task.md` (if exists).
   - Fill metadata: issue_number, title, created_at, workflow, etc.

4. **Execute requirement analysis** (analysis only, no business code):
   - Read and understand the Issue description.
   - Search related code files.
   - Analyze code structure and impact scope.
   - Identify technical risks and dependencies.
   - Estimate effort and complexity.

5. **Output analysis document**:
   - Create `analysis.md` with: requirement understanding, related files, impact assessment, technical risks, dependencies, effort estimate.

6. **Update task status**:
   - current_step: requirement-analysis, mark as complete.

7. **Inform user**:
   - Output task ID, title, workflow.
   - Suggest next step:
     - Claude Code / OpenCode: `/plan-task {task-id}`
     - Gemini CLI: `/collaborator:plan-task {task-id}`
     - Codex CLI: `/prompts:collaborator-plan-task {task-id}`

**Note**: Do NOT write or modify any business code. Analysis only.
"""
