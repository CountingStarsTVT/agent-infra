description = "Sync task progress to the corresponding GitHub Issue"
prompt = """
Sync task {{args}} progress to the GitHub Issue.

**Current time**: !{date '+%Y-%m-%d %H:%M:%S'}

**Task status**:
!{if [ -d .ai-workspace/active/{{args}} ]; then echo "active"; else echo "check other dirs"; fi}

Steps:

1. **Read task**:
   - Read `task.md` to get `issue_number`.
   - Read context files, extract key progress.

2. **Generate summary**:
   - Include: completed steps, current progress, next steps, related files.
   - Keep summary concise and human-readable.

3. **Sync**:
   - `gh issue comment <issue_number> --body "<summary>"`

4. **Update status**:
   - Update `last_synced_at` in `task.md`.

5. **Inform user**: Sync complete.
"""
