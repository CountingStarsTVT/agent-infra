description = "Design a technical solution and output an implementation plan"
prompt = """
Design a technical solution for task {{args}}.

**Check prerequisites**:
!{if [ -f .ai-workspace/active/{{args}}/task.md ]; then echo "Task exists in active"; else echo "Task not in active directory"; fi}
!{find .ai-workspace -type f -path "*/{{args}}/task.md" 2>/dev/null || echo "Task file not found"}

Steps:

1. **Verify prerequisites**:
   - If task file not found, report error and exit.
   - Read `task.md` and `analysis.md`.
   - If `analysis.md` does not exist, prompt user to run analyze-issue or create-task first.

2. **Understand the problem**:
   - Based on `analysis.md`, understand root cause, impact scope, and constraints.
   - Identify special requirements (security, regression, scalability).

3. **Design solution**:
   - Propose multiple approaches and compare trade-offs.
   - Select the optimal approach.
   - Define detailed implementation steps.
   - List files to create/modify.
   - Design verification strategy (tests, regression).
   - Assess impact (performance, security, compatibility).
   - Define risk control and rollback plan.

4. **Output plan document**:
   - Create `plan.md` with: decision rationale, technical approach, implementation steps, file list, verification strategy, impact assessment, risk control.

5. **Update task status**:
   - current_step: technical-design, mark as complete.

6. **Inform user**:
   - This is a **human review checkpoint**. After approval:
     - Claude Code / OpenCode: `/implement-task {{args}}`
     - Gemini CLI: `/collaborator:implement-task {{args}}`
     - Codex CLI: `/prompts:collaborator-implement-task {{args}}`
"""
