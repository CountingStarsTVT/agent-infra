description = "Commit current changes to Git with copyright header year check"
prompt = """
Commit current changes to Git.

**Current state**:
!{git status --short}
!{git log -1 --oneline}
Current year: !{date +%Y}

Steps:

1. **Check local modifications**:
   - If no staged changes, prompt user to use `git add` first.
   - Carefully read `git diff` output. Do not overwrite user's implementation.

2. **Copyright header year check (CRITICAL)**:
   - For each modified file, check if it contains a copyright header.
   - If the header year is outdated, update to current year.
   - Format: "Copyright (C) 2024" -> "Copyright (C) 2024-{current_year}".
   - Do NOT hardcode the year.

3. **Generate commit message**:
   - Format: `<type>(<scope>): <subject>`, English imperative mood, max 50 chars.
   - Body: describe changes in detail (2-4 bullet points).
   - Signature: `Co-Authored-By: Gemini <noreply@google.com>`

4. **Execute commit**:
   ```bash
   git commit -m "$(cat <<'EOF'
   <type>(<scope>): <subject>

   <body>

   Co-Authored-By: Gemini <noreply@google.com>
   EOF
   )"
   ```

5. **Verify**: Run `git status` to confirm commit succeeded.

**Post-commit**:
- If task-related, prompt user to update task status:
  - Claude Code / OpenCode: `/check-task` or `/complete-task`
  - Gemini CLI: `/collaborator:check-task` or `/collaborator:complete-task`
  - Codex CLI: `/prompts:collaborator-check-task` or `/prompts:collaborator-complete-task`
"""
