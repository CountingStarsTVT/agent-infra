description = "Implement a task based on the technical plan"
prompt = """
Implement task {{args}} based on the technical plan.

**Check prerequisites**:
!{if [ -f .ai-workspace/active/{{args}}/task.md ]; then echo "Task file exists"; else echo "Task file not found"; fi}
!{if [ -f .ai-workspace/active/{{args}}/plan.md ]; then echo "Plan exists"; else echo "Plan not found"; fi}

Steps:

1. **Prepare**:
   - If prerequisites not met, prompt user.
   - Read `plan.md`, understand implementation steps and file list.

2. **Execute code implementation**:
   - **Strictly follow `plan.md` step order**.
   - Implement feature code.
   - **Write comprehensive unit tests**.
   - Run tests to verify functionality.
   - Follow project coding standards.

3. **Run verification**:
   - Execute the project's test suite to ensure all tests pass.

4. **Output implementation report**:
   - Create `implementation.md` with: modified file list, key code notes, test results, deviations from plan (if any), items for review, next step suggestions.

5. **Update task status**:
   - current_step: implementation, mark as complete.

6. **Inform user**:
   - Suggest next step - code review:
     - Claude Code / OpenCode: `/review-task {{args}}`
     - Gemini CLI: `/collaborator:review-task {{args}}`
     - Codex CLI: `/prompts:collaborator-review-task {{args}}`

**Principles**:
- Strictly follow the plan.
- Run tests after each step.
- Do NOT auto-commit (git commit). Wait for review.
"""
