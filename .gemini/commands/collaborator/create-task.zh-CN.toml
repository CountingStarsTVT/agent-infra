description = "根据自然语言描述创建任务并生成需求分析文档"
prompt = """
请根据用户的自然语言描述创建任务并执行需求分析。

行为边界: 只产出 task.md 和 analysis.md，禁止编写业务代码。

用户描述: {{args}}

当前时间: !{date '+%Y-%m-%d %H:%M:%S'}

执行以下步骤:

1. **解析用户描述**:
   - 提取任务标题（精简英文，50 字符以内）。
   - 确定类型: feature|bugfix|refactor|docs|chore。
   - 确定工作流: feature/docs/chore -> feature-development, bugfix -> bug-fix, refactor -> refactoring。
   - 如果描述不够清晰，先向用户确认关键信息。

2. **生成任务 ID**: 格式 `TASK-YYYYMMDD-HHMMSS`。

3. **创建任务目录**:
   - 创建 `.ai-workspace/active/TASK-{timestamp}/`。
   - 基于 `.agents/templates/task.md`（如果存在）创建 task.md。
   - 填写元数据: id、type、workflow、status、created_at、updated_at。
   - created_by: human, current_step: requirement-analysis。

4. **执行需求分析**（仅分析，不编写业务代码）:
   - 理解用户描述的需求。
   - 搜索相关代码文件（只读不改）。
   - 分析代码结构和影响范围。
   - 识别技术风险和依赖。
   - 评估工作量和复杂度。

5. **输出分析文档**:
   - 创建 analysis.md，包含: 需求来源、需求理解、相关文件、影响评估、技术风险、依赖关系、工作量评估。

6. **更新任务状态**: 标记 requirement-analysis 为完成。

7. **告知用户**:
   - 输出任务 ID、标题、类型、工作流。
   - 提示下一步:
     - Claude Code / OpenCode: `/plan-task {task-id}`
     - Gemini CLI: `/collaborator:plan-task {task-id}`
     - Codex CLI: `/prompts:collaborator-plan-task {task-id}`

STOP: 完成后立即停止，不要继续执行 plan、implement 或任何后续步骤。
"""
