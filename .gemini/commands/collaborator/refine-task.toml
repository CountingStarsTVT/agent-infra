description = "Handle code review feedback and fix issues"
prompt = """
Handle code review feedback and fix issues for task {{args}}.

**Check prerequisites**:
!{if [ -f .ai-workspace/active/{{args}}/review.md ]; then echo "Review report exists"; else echo "Review report not found"; fi}

Steps:

1. **Read review report**:
   - Read `review.md`.
   - Extract all Blocker and Major issues.

2. **Execute fixes**:
   - Fix issues by priority: Blocker -> Major -> Minor.
   - Ensure no new issues are introduced.
   - Run tests to ensure they pass.

3. **Create fix report**:
   - Create `refinement-report.md` with: fix summary, fix details, unfixed issues and reasons, test results.

4. **Update task status**:
   - current_step: refinement, updated_at: current time.

5. **Inform user**:
   - Suggest next step:
     - Re-review:
       - Claude Code / OpenCode: `/review-task {{args}}`
       - Gemini CLI: `/collaborator:review-task {{args}}`
       - Codex CLI: `/prompts:collaborator-review-task {{args}}`
     - Or commit directly:
       - Claude Code / OpenCode: `/commit`
       - Gemini CLI: `/collaborator:commit`
       - Codex CLI: `/prompts:collaborator-commit`

**Note**: Do not add extra changes. Do NOT auto-commit.
"""
