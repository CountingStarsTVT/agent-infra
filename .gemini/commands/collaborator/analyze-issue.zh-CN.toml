description = "分析 GitHub Issue 并创建需求分析文档"
prompt = """
请分析 GitHub Issue #{{args}} 并创建任务文件。

当前时间: !{date '+%Y-%m-%d %H:%M:%S'}

Issue 信息:
!{gh issue view {{args}} --json number,title,body,labels 2>/dev/null || echo "Issue not found"}

执行以下步骤:

1. **检查 Issue 信息**: 如果未找到，请提示用户检查 Issue 编号。

2. **生成任务 ID**: 格式 `TASK-YYYYMMDD-HHMMSS`。

3. **创建任务目录**:
   - 创建 `.ai-workspace/active/TASK-{timestamp}/`。
   - 基于 `.agents/templates/task.md`（如果存在）创建 task.md。
   - 填写元数据: issue_number、title、created_at、workflow 等。

4. **执行需求分析**（仅分析，不编写业务代码）:
   - 阅读并理解 Issue 描述。
   - 搜索相关代码文件。
   - 分析代码结构和影响范围。
   - 识别技术风险和依赖。
   - 评估工作量和复杂度。

5. **输出分析文档**:
   - 创建 analysis.md，包含: 需求理解、相关文件、影响评估、技术风险、依赖关系、工作量评估。

6. **更新任务状态**:
   - current_step: requirement-analysis，标记为完成。

7. **告知用户**:
   - 输出任务 ID、标题、工作流。
   - 提示下一步:
     - Claude Code / OpenCode: `/plan-task {task-id}`
     - Gemini CLI: `/collaborator:plan-task {task-id}`
     - Codex CLI: `/prompts:collaborator-plan-task {task-id}`

**注意**: 禁止编写或修改任何业务代码，仅做分析。
"""
