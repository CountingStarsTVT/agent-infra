description = "Create a Pull Request"
prompt = """
Create a Pull Request.

**User-specified target branch**: {{args}}

**Current state**:
!{git status --short}
!{git branch --show-current}
!{git log --oneline --decorate --first-parent -20}

**Recent PRs**:
!{gh pr list --limit 3 --state merged --json number,title,body 2>/dev/null || echo "No recent PRs"}

Steps:

1. **Prepare**:
   - Read `.github/PULL_REQUEST_TEMPLATE.md` (if exists).
   - Confirm current branch is pushed to remote. If not, run `git push -u origin HEAD`.

2. **Generate PR content**:
   - Title: Conventional Commits format, concise description.
   - Body: Based on template and recent commits.
   - Footer: `Generated with Gemini CLI`

3. **Create PR**:
   - Use `gh pr create`.
   - Specify `--base`:
     - If user specified target branch ({{args}} non-empty), use that value.
     - If not specified, infer from current branch and git log.
     - If unable to determine, ask user.

4. **Inform user**:
   - Output PR link.
   - Next step if in a task workflow:
     - Sync progress:
       - Claude Code / OpenCode: `/sync-pr {task-id}`
       - Gemini CLI: `/collaborator:sync-pr {task-id}`
       - Codex CLI: `/prompts:collaborator-sync-pr {task-id}`
     - Or complete task:
       - Claude Code / OpenCode: `/complete-task {task-id}`
       - Gemini CLI: `/collaborator:complete-task {task-id}`
       - Codex CLI: `/prompts:collaborator-complete-task {task-id}`
"""
